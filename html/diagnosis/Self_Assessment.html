<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../css/Self.css" />
  <title>자가진단 챗봇 페이지</title>
</head>
<body>
  <button class="back-btn" type="button" onclick="goBack()">
    <img src="../../img/back.png" alt="뒤로가기" />
  </button>

  <div class="Allbody">
    <div class="chat-wrap">

      <div class="chat-header">
        <div class="chat-title">AI 자가진단 테스트</div>
        <div class="chat-subtitle">현재 상황을 AI로 확인해보세요</div>
      </div>

      <div class="chat-body" id="chatBody"></div>

      <!-- 나중에 실제 입력창/자동완성 구조로 확장 가능 -->
      <div class="chat-input-area">
        <div class="input-fake">선택지를 눌러서 답변해주세요</div>
        <div class="status-box" id="statusBox"></div>
      </div>

    </div>
  </div>

  <script src="../../js/Self.js"></script>
</body>
</html>
