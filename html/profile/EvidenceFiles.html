<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../css/evidence.css" />
  <title>증거 보존 페이지</title>
</head>
<body>
  <div class="app-page">
    <div class="page-shell">
      <!-- 상단 헤더 -->
      <header class="top-bar">
        <button class="back-btn" type="button" onclick="goBack()">
        <img src="../../img/back.png" alt="뒤로가기" />
        </button>
        <h1>증거 보존 파일</h1>
      </header>

      <!-- 필터 영역 -->
      <section class="filter-card">
        <!-- 파일 종류 탭 -->
        <div class="tab-row">
          <button class="tab-btn active" type="button" data-type="photo">사진</button>
          <button class="tab-btn" type="button" data-type="video">비디오</button>
          <button class="tab-btn" type="button" data-type="doc">파일</button>
        </div>

        <!-- 아이폰 스타일 커스텀 피커 버튼 -->
        <div class="select-row">
          <button type="button" class="picker-trigger" id="yearTrigger">
            전체 연도
          </button>

          <button type="button" class="picker-trigger" id="monthTrigger">
            전체 월
          </button>
        </div>
      </section>

      <!-- 파일 목록 영역 -->
            <section class="list-card">
                <div id="fileList" class="file-list"></div>
                <div id="emptyState" class="empty-state hidden"></div>
            </section>
            </div>
        </div>

        <!-- 하단 시트형 피커 -->
        <div class="picker-sheet hidden" id="pickerSheet">
            <div class="picker-backdrop" id="pickerBackdrop"></div>

            <div class="picker-panel">
            <div class="picker-header">
                <button type="button" class="picker-close-btn" id="pickerCancelBtn">취소</button>
                <div class="picker-title" id="pickerTitle">선택</div>
                <button type="button" class="picker-done-btn" id="pickerDoneBtn">확인</button>
            </div>

            <div class="picker-list" id="pickerList"></div>
            </div>
        </div>

        <!-- 파일 미리보기 모달 -->
        <div class="preview-modal hidden" id="previewModal">
            <div class="preview-backdrop" id="previewBackdrop"></div>

            <div class="preview-panel">
            <div class="preview-header">
                <div class="preview-title" id="previewTitle">파일 보기</div>
                <button type="button" class="preview-close-btn" id="previewCloseBtn">닫기</button>
            </div>

            <div class="preview-body" id="previewBody"></div>
            </div>
        </div>

  <script src="../../js/evidence.js"></script>
</body>
</html>
